<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Bitcoin 101</title>
</head>

<body>

    <button id="generateInvoiceBtn">Generate Invoice</button>

    <div id="output"></div>

    <script>
        const API = "https://YOUR-BACKEND-URL"; // ⚠️ change this

        let currentPaymentHash = null;

        /* ─────────────────────────────
           CREATE INVOICE (REAL)
        ──────────────────────────── */
        async function createInvoice(sats) {
            const res = await fetch(`${API}/invoice/create`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    sats,
                    memo: "Bitcoin Education Unlock"
                })
            });

            return await res.json();
        }

        /* ─────────────────────────────
           CHECK PAYMENT
        ──────────────────────────── */
        async function checkPayment(payment_hash) {
            const res = await fetch(`${API}/invoice/check`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ payment_hash })
            });

            return await res.json();
        }

        /* ─────────────────────────────
           UNLOCK CONTENT
        ──────────────────────────── */
        async function unlockConcept() {
            const res = await fetch(`${API}/unlock/concept`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    payment_hash: currentPaymentHash,
                    concept_id: 4
                })
            });

            const data = await res.json();

            if (data.unlocked) {
                document.getElementById("output").innerHTML =
                    "<h3>🔓 Concept Unlocked: Self Custody</h3>";
            }
        }

        /* ─────────────────────────────
           UI FLOW
        ──────────────────────────── */
        document.getElementById("generateInvoiceBtn").addEventListener("click", async () => {

            const invoice = await createInvoice(21);

            currentPaymentHash = invoice.payment_hash;

            document.getElementById("output").innerHTML = `
        <p><b>Pay this invoice:</b></p>
        <code>${invoice.payment_request}</code>
        <br><br>
        <button onclick="pollPayment()">Check Payment</button>
    `;
        });

        /* ─────────────────────────────
           POLLING LOOP
        ──────────────────────────── */
        async function pollPayment() {
            const res = await checkPayment(currentPaymentHash);

            if (res.paid) {
                document.getElementById("output").innerHTML +=
                    "<p>✅ Payment detected</p>";

                await unlockConcept();
            } else {
                document.getElementById("output").innerHTML +=
                    "<p>⏳ Not paid yet...</p>";
            }
        }
    </script>

</body>

</html>
